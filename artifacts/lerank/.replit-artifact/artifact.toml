kind = "web"
previewPath = "/"
title = "Lerank"
version = "1.0.0"
id = "artifacts/lerank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23195
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lerank run dev"

[services.env]
PORT = "23195"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lerank", "run", "build"]
publicDir = "artifacts/lerank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
