kind = "slides"
previewPath = "/lerank-deck/"
title = "Lerank Pitch Deck"
version = "1.0.0"
id = "artifacts/lerank-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lerank-deck/" ]
localPort = 21913

[services.development]
run = "pnpm --filter @workspace/lerank-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lerank-deck", "run", "build" ]
publicDir = "artifacts/lerank-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21913"
BASE_PATH = "/lerank-deck/"
