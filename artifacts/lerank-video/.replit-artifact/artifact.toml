kind = "video"
previewPath = "/lerank-video/"
title = "Lerank Explainer Video"
version = "1.0.0"
id = "artifacts/lerank-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/lerank-video/" ]
localPort = 23604

[services.development]
run = "pnpm --filter @workspace/lerank-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lerank-video", "run", "build" ]
publicDir = "artifacts/lerank-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23604"
BASE_PATH = "/lerank-video/"
