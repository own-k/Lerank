packages:
  "framer-motion": "For parallax scroll effects, entrance animations, and scroll-driven word reveal"
  "@fontsource/inter": "Inter typeface for body and UI text"
  "@fontsource/instrument-serif": "Instrument Serif for the italic accent word in the hero title"
  "lucide-react": "ChevronDown icon in the navbar Services link"
  "clsx": "Utility class merging"
  "tailwind-merge": "Utility class merging"

images:
  - path: "artifacts/neuralyn/public/hero-dashboard.png"
    description: "Dark analytics dashboard UI screenshot on pure black background. Shows a sidebar nav, KPI metric cards with sparklines, a blue area line chart for revenue over time, a donut chart for traffic sources, a progress bar card for Q1 goals, a recent activity table, and a weekly sessions bar chart. Clean minimal dark SaaS aesthetic, white text, accent colors blue #4f8ef7, green #22c55e, purple #a855f7."
    aspect_ratio: "16:9"
  - path: "artifacts/neuralyn/public/logo.png"
    description: "Small minimalist neural network icon. Three layers of nodes connected by faint lines. White nodes and white connections on transparent background. Clean, geometric, tech-forward."
    aspect_ratio: "1:1"
  - path: "artifacts/neuralyn/public/quote-symbol.png"
    description: "Large decorative opening quotation mark in white on transparent background. Elegant serif style, slight weight, clean and editorial."
    aspect_ratio: "7:5"
  - path: "artifacts/neuralyn/public/testimonial-avatar.png"
    description: "Professional headshot of a confident young woman with warm skin tone, dark hair, business casual attire. Soft studio lighting, neutral background. Circular crop friendly."
    aspect_ratio: "1:1"

notes:
  - Pure dark mode only — no light mode toggle needed.
  - The hero section uses a background video (external CDN URL) with a dashboard image overlaid using mixBlendMode luminosity.
  - Liquid glass pill in the hero uses a custom CSS class with backdrop-filter and gradient border mask.
  - Testimonial section uses scroll-driven per-word opacity and color animation via Framer Motion useScroll + useTransform.
