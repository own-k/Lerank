<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="8" cy="12" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="8" cy="20" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="8" cy="28" r="3.5" fill="white" opacity="0.9"/>
  <!-- Hidden layer -->
  <circle cx="20" cy="8"  r="3.5" fill="white" opacity="0.9"/>
  <circle cx="20" cy="20" r="3.5" fill="white"/>
  <circle cx="20" cy="32" r="3.5" fill="white" opacity="0.9"/>
  <!-- Output layer -->
  <circle cx="32" cy="16" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="24" r="3.5" fill="white" opacity="0.9"/>
  <!-- Connections input→hidden -->
  <line x1="11.5" y1="12" x2="16.5" y2="9"  stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="11.5" y1="12" x2="16.5" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="11.5" y1="12" x2="16.5" y2="31" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="11.5" y1="20" x2="16.5" y2="9"  stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="11.5" y1="20" x2="16.5" y2="20" stroke="white" stroke-width="1"   opacity="0.55"/>
  <line x1="11.5" y1="20" x2="16.5" y2="31" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="11.5" y1="28" x2="16.5" y2="9"  stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="11.5" y1="28" x2="16.5" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="11.5" y1="28" x2="16.5" y2="31" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <!-- Connections hidden→output -->
  <line x1="23.5" y1="9"  x2="28.5" y2="16" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="23.5" y1="9"  x2="28.5" y2="24" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="23.5" y1="20" x2="28.5" y2="16" stroke="white" stroke-width="1"   opacity="0.55"/>
  <line x1="23.5" y1="20" x2="28.5" y2="24" stroke="white" stroke-width="1"   opacity="0.55"/>
  <line x1="23.5" y1="32" x2="28.5" y2="16" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="23.5" y1="32" x2="28.5" y2="24" stroke="white" stroke-width="0.8" opacity="0.4"/>
</svg>
